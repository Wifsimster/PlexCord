name: Release

# Binaries are attached to the GitHub Release that semantic-release creates.
#
# The tag semantic-release pushes is created with the default GITHUB_TOKEN, and
# GitHub deliberately does NOT start new workflow runs from tags pushed with
# that token. A plain `on: push: tags` trigger therefore never fires. Instead
# we chain off the "Semantic Release" workflow's completion (same token
# context, no recursion block) and, in the `resolve` job, target the latest
# release — building only when it has no assets yet. The `push`/`workflow_dispatch`
# triggers are kept so a PAT-pushed tag or a manual run also works.
on:
  workflow_run:
    workflows: ["Semantic Release"]
    types:
      - completed
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach assets to (e.g. v1.0.2). Defaults to the latest release."
        required: false

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve release
    runs-on: ubuntu-latest
    # For the workflow_run trigger, only continue after a successful
    # Semantic Release run. Other triggers always pass this guard.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      tag: ${{ steps.decide.outputs.tag }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Decide whether to build and which tag to target
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          # Determine the target tag based on how the workflow was triggered.
          case "$EVENT_NAME" in
            push)
              tag="$REF_NAME"
              ;;
            workflow_dispatch)
              tag="${INPUT_TAG:-}"
              ;;
            *)
              tag=""
              ;;
          esac

          # Fall back to the latest release for workflow_run and for a manual
          # run with no tag supplied.
          if [ -z "$tag" ]; then
            tag="$(gh release view --json tagName --jq '.tagName' 2>/dev/null || true)"
          fi

          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "No release found to attach assets to; nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On the automatic (workflow_run) path, don't rebuild a release that
          # already has assets — this makes the workflow idempotent across the
          # many main pushes that produce no new version.
          asset_count="$(gh release view "$tag" --json assets --jq '.assets | length' 2>/dev/null || echo 0)"
          if [ "$EVENT_NAME" = "workflow_run" ] && [ "$asset_count" -gt 0 ]; then
            echo "Release $tag already has $asset_count asset(s); skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Targeting release $tag (existing assets: $asset_count)."
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build application
        shell: bash
        run: |
          wails build -clean -platform windows/amd64 -ldflags "-X plexcord/internal/version.Version=${{ needs.resolve.outputs.tag }} -X plexcord/internal/version.Commit=${{ github.sha }} -X plexcord/internal/version.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Rename binary
        run: |
          mv build/bin/PlexCord.exe build/bin/PlexCord-windows-amd64.exe

      - name: Generate checksum
        run: |
          cd build/bin
          certutil -hashfile PlexCord-windows-amd64.exe SHA256 > PlexCord-windows-amd64.exe.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/bin/PlexCord-windows-amd64.exe
            build/bin/PlexCord-windows-amd64.exe.sha256

  build-macos:
    name: Build macOS
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build application
        run: |
          wails build -clean -platform darwin/universal -ldflags "-X plexcord/internal/version.Version=${{ needs.resolve.outputs.tag }} -X plexcord/internal/version.Commit=${{ github.sha }} -X plexcord/internal/version.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg-contents
          cp -r build/bin/PlexCord.app dmg-contents/

          # Create symbolic link to Applications folder
          ln -s /Applications dmg-contents/Applications

          # Create DMG
          hdiutil create -volname "PlexCord" -srcfolder dmg-contents -ov -format UDZO build/bin/PlexCord-darwin-universal.dmg

      - name: Generate checksum
        run: |
          cd build/bin
          shasum -a 256 PlexCord-darwin-universal.dmg > PlexCord-darwin-universal.dmg.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            build/bin/PlexCord-darwin-universal.dmg
            build/bin/PlexCord-darwin-universal.dmg.sha256

  build-linux:
    name: Build Linux
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build application
        run: |
          wails build -clean -tags webkit2_41 -platform linux/amd64 -ldflags "-X plexcord/internal/version.Version=${{ needs.resolve.outputs.tag }} -X plexcord/internal/version.Commit=${{ github.sha }} -X plexcord/internal/version.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Install AppImage tools
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppImage
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binary
          cp build/bin/PlexCord AppDir/usr/bin/plexcord

          # Create desktop file
          cat > AppDir/usr/share/applications/plexcord.desktop << EOF
          [Desktop Entry]
          Name=PlexCord
          Exec=plexcord
          Icon=plexcord
          Type=Application
          Categories=Utility;AudioVideo;
          Comment=Discord Rich Presence for Plex
          EOF

          # Create a placeholder icon (you should replace this with actual icon)
          # For now, create a simple SVG
          cat > AppDir/usr/share/icons/hicolor/256x256/apps/plexcord.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
            <rect width="256" height="256" fill="#E5A00D"/>
            <text x="128" y="140" font-size="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif">PC</text>
          </svg>
          EOF

          # Create AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

          # Rename to expected name
          mv PlexCord-*.AppImage build/bin/PlexCord-linux-amd64.AppImage || true
          mv PlexCord-x86_64.AppImage build/bin/PlexCord-linux-amd64.AppImage || true

      - name: Generate checksum
        run: |
          cd build/bin
          sha256sum PlexCord-linux-amd64.AppImage > PlexCord-linux-amd64.AppImage.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/PlexCord-linux-amd64.AppImage
            build/bin/PlexCord-linux-amd64.AppImage.sha256

  upload-release-assets:
    name: Upload Release Assets
    needs: [resolve, build-windows, build-macos, build-linux]
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      TAG: ${{ needs.resolve.outputs.tag }}
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Upload binaries to release
        run: |
          gh release upload "$TAG" release-files/* --clobber

      - name: Update release body with installation instructions
        run: |
          CURRENT_BODY=$(gh release view "$TAG" --json body -q '.body')

          INSTALL_INSTRUCTIONS="

          ---

          ### Installation

          Download the appropriate binary for your platform:
          - **Windows**: \`PlexCord-windows-amd64.exe\`
          - **macOS**: \`PlexCord-darwin-universal.dmg\`
          - **Linux**: \`PlexCord-linux-amd64.AppImage\`

          ### Checksums
          SHA256 checksums are provided for each binary."

          gh release edit "$TAG" \
            --title "PlexCord $TAG" \
            --notes "${CURRENT_BODY}${INSTALL_INSTRUCTIONS}"
